<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fiocchetto lilla">
  <!-- Marchio soft di Ancora: fiocchetto lilla, sobrio e rispettoso -->
  <rect width="64" height="64" rx="16" fill="#F7F2F7"/>
  <g
    fill="none"
    stroke="#C8A2C8"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(8 6)"
  >
    <!-- code del nastro -->
    <path d="M24 26 L16 48"/>
    <path d="M24 26 L32 48"/>
    <!-- anse del fiocco -->
    <path d="M24 26 C16 12 4 16 12 32"/>
    <path d="M24 26 C32 12 44 16 36 32"/>
    <!-- nodo centrale -->
    <circle cx="24" cy="26" r="2.5" fill="#C8A2C8" stroke="none"/>
  </g>
</svg>
